spring.application.name=springboot
spring.mvc.apiversion.use.header=Api-Version
#debug=true
#server.port=8081
#Commented out these upper two overridden key:value,as they also are not needed for now
# ===================================================================
# H2 DATABASE SETUP - BASIC REQUIREMENTS
# ===================================================================

# H2 setup properly kaam karne ke liye generally ye cheeze chahiye hoti hain:
#
# 1. pom.xml me H2 dependency
# 2. datasource URL configuration
# 3. H2 console enable configuration
# 4. Optional JPA/Hibernate configuration
# 5. Optional schema.sql / data.sql scripts
#
# H2 Console Open URL :
# http://localhost:8080/h2-console
#
# IMPORTANT LOGIN DETAILS :
# JDBC URL  : jdbc:h2:mem:jobportaldb
# Username  : sa
# Password  : (blank / empty)
#
# NOTE :
# H2 in-memory database application restart hote hi reset ho jata hai.


# ===================================================================
# 1. DATABASE CONFIGURATION (H2 IN-MEMORY)
# ===================================================================

# KYU? :
# By default H2 random database URLs generate karta hai
# (jaise: jdbc:h2:mem:ab57dfd2...)
#
# PROBLEM :
# Har restart par URL change ho jata hai.
#
# KYA? :
# Fixed database name define kiya gaya hai taaki same URL use ho.
spring.datasource.url=jdbc:h2:mem:jobportaldb


# DEFAULT INFO ??
# Spring Boot mostly H2 driver automatically detect kar leta hai.
#
# KYA? :
# Explicitly define karne se readability improve hoti hai.
spring.datasource.driver-class-name=org.h2.Driver


# DEFAULT INFO ??
# H2 ka default username already 'sa' hota hai.
spring.datasource.username=sa


# DEFAULT INFO ??
# H2 ka default password blank hota hai.
spring.datasource.password=


# ===================================================================
# 2. H2 CONSOLE CONFIGURATION (UI DASHBOARD)
# ===================================================================

# NOTE :
# Yeh configurations tabhi useful hain jab pom.xml me
# H2 dependency present ho.

# KYU? :
# Security reasons ki wajah se H2 console default disabled hota hai.
#
# KYA? :
# Browser me H2 dashboard access allow karta hai.
spring.h2.console.enabled=true


# KYU? :
# H2 console ka custom URL path define karne ke liye.
#
# KYA? :
# Browser me:
# http://localhost:8080/h2-console
#
# open kar sakte hain.
spring.h2.console.path=/h2-console


# ===================================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ===================================================================

# DEFAULT INFO ??
# Spring Boot dialect automatically detect kar leta hai mostly.
#
# KYA? :
# Explicitly batata hai ki Hibernate H2-specific SQL generate kare.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# KYU? :
# Entity classes ke basis par tables automatically create/update karega.
#
# OPTIONS :
# create
# create-drop
# update
# validate
# none
spring.jpa.hibernate.ddl-auto=update


# KYU? :
# Hibernate SQL queries console me print hongi.
spring.jpa.show-sql=true


# KYU? :
# SQL queries properly formatted form me print hongi.
spring.jpa.properties.hibernate.format_sql=true


# IMPORTANT ??
# data.sql ko Hibernate table creation ke BAAD run karne ke liye.
#
# WARNA :
# "Table not found" issue aa sakta hai.
spring.jpa.defer-datasource-initialization=true


# ===================================================================
# 4. SQL INITIALIZATION CONFIGURATION (.sql Scripts)
# ===================================================================

# OPTIONS :
#
# never
# -> SQL scripts kabhi run nahi hongi
#
# always
# -> Har DB type par scripts run hongi
#
# embedded
# -> Sirf embedded DBs (H2 etc.) par scripts run hongi
spring.sql.init.mode=embedded


# KYU? :
# Spring startup par schema.sql search karega. aur wo by default resource folder me dekhta h
# agar direct resource me nahi toh wo H2 DB console me wo .sql file ka schema dikhega hi nahi na hi data.sql, agar location mismatch huyi toh, isliye agar hum usko kisi dure package me rakh rahe h toh yaha pe
#uss folder ki location ko map kar dena chahiye

# This property helps modularize scripts into folders.
#
# NOTE :
# 'optional:' lagane se file missing hone par error nahi aayega.
spring.sql.init.schema-locations=optional:classpath:sql/schema.sql


# KYU? :
# Initial/sample data insert karne ke liye.
spring.sql.init.data-locations=optional:classpath:sql/data.sql


# ===================================================================
# 5. LOGGING CONFIGURATION (COLORFUL CONSOLE & DEBUGGING)
# ===================================================================

# KYU? :
# Console logs ko readable aur colorful banane ke liye.
#
# COLORS :
# White  -> Timestamp
# Red    -> Log level
# Cyan   -> Thread
# Yellow -> Logger/Class
# Green  -> Actual message
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){white} %clr(%-5level){red} %clr([%thread]){cyan} --- %clr(%logger{36}){yellow} : %clr(%msg%n){green}


# KYU? :
# Spring MVC endpoint mappings aur request handling logs dikhane ke liye.
logging.level.org.springframework.web=DEBUG


# KYU? :
# H2 auto-configuration aur console setup logs dekhne ke liye.
logging.level.org.springframework.boot.autoconfigure.h2=DEBUG


# OPTIONAL ADVANCED DEBUGGING ??
# Cleaner endpoint mapping logs ke liye.
#
# EXAMPLE :
# "/users" mapped to UserController#getUsers()
#
# logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG


# ===================================================================
# 6. SERVER CONFIGURATION
# ===================================================================

# DEFAULT INFO ??
# Spring Boot ka default server port already 8080 hota hai.
#
# OPTIONAL :
# server.port=8081
#
# TAB APPLICATION OPEN HOGA :
# http://localhost:8081


# ===================================================================
# 7. JACKSON (JSON) CONFIGURATION
# ===================================================================

# KYU? :
# JSON responses ko readable/pretty-print format me dikhane ke liye.
spring.jackson.serialization.indent-output=true


# ===================================================================
# 8. BANNER CONFIGURATION
# ===================================================================

# DEFAULT INFO ??
# Spring Boot startup par ASCII banner show karta hai.
#
# OPTIONS :
# console
# off
# log
spring.main.banner-mode=console