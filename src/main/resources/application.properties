spring.application.name=springboot
spring.mvc.apiversion.use.header=Api-Version
#debug=true
#server.port=8081
#Commented out these upper two overridden key:value,as they also are not needed for now

#COLORFUL CONSOLE & PROPER LOG PATTERN
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){white} %clr(%-5level){red} %clr([%thread]){cyan} --- %clr(%logger{36}){yellow} : %clr(%msg%n){green}

# ===================================================================
# 1. H2 DATABASE CONSOLE CONFIGURATION
# ===================================================================

# KYU? : By default Spring Boot 3.x/4.x me security ki wajah se H2 Console disabled hota hai.
# KYA? : Isko 'true' karne se browser me H2 database ka UI (dashboard) open karne ki permission milti hai.
spring.h2.console.enabled=true

# KYU? : Agar dashboard ka default URL path badalna ho.
# KYA? : Isko set karne ke baad aap browser me 'localhost:8080/h2-console' par jaakar DB dekh sakte ho.
spring.h2.console.path=/h2-console

# ===================================================================
# 2. LOG LEVEL SETTINGS (FOR METHOD & URL MAPPING DETAILS)
# ===================================================================

# KYU? : Default 'INFO' level par Spring Boot saare internal URL/Method mappings logs me nahi dikhata.
# KYA? : Isko 'DEBUG' karne se console me saaf dikhega ki kaunsa API endpoint (/users, /products) kis Controller ke kis Method se connect ho raha hai.
logging.level.org.springframework.web=DEBUG

# KYU? : H2 database automatically background me kya URL aur credentials bana raha hai, woh check karne ke liye.
# KYA? : Logs me explicit line print karega: "H2 console available at '/h2-console'. Database available at..."
logging.level.org.springframework.boot.autoconfigure.h2=DEBUG

spring.datasource.url=jdbc:h2:mem:testdb
#listen in the console logs you may see 2026-05-17 01:26:49 INFO  [restartedMain] --- o.s.b.h.a.H2ConsoleAutoConfiguration : H2 console available at '/h2-console'. Database available at 'jdbc:h2:mem:ab57dfd2-b840-4b6e-bc0d-531ab6954379'
# now this hash 'ab57dfd2-b840-4b6e-bc0d-531ab6954379' is dynamic changes on everytime the application is run. so it becomes cumbersome to manually copy-paste each time the different url
# so we have just defined one single path each time
